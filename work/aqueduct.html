<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqueduct — Gregory Parizhsky</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/site-loader.css">
    <link rel="stylesheet" href="../assets/work-lightbox.css">
    <script src="../assets/site-loader.js" defer></script>
    <script src="../assets/work-lightbox.js" defer></script>

    <style>
        :root {
            --bg: #F5F7F5; --surface: #FFFFFF; --text: #1C271E; --muted: #6A7A6B;
            --accent: #306e41; --border: #DDE5DD;
            --serif: 'Instrument Serif', Georgia, serif;
            --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
            --mono: 'DM Mono', 'SF Mono', monospace;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--sans);
            font-weight: 300; line-height: 1.6; overflow-x: hidden;
            animation: pageIn 450ms var(--ease) both;
        }
        @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes trackDrop {
            0%   { top: -50%; }
            100% { top: 110%; }
        }
        img { display: block; max-width: 100%; }
        a { color: inherit; }

        #progress {
            position: fixed; top: 0; left: 0; width: 100%; height: 1px;
            background: var(--accent); transform: scaleX(0); transform-origin: left;
            z-index: 200; transition: transform 80ms linear;
        }

        .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .ambient::before {
            content: ''; position: absolute; top: -15%; left: -5%;
            width: 55%; height: 55%; border-radius: 50%;
            background: radial-gradient(circle, rgba(50,69,55,0.07) 0%, transparent 68%);
            animation: driftA 32s ease-in-out infinite alternate;
        }
        .ambient::after {
            content: ''; position: absolute; bottom: -8%; right: -8%;
            width: 45%; height: 45%; border-radius: 50%;
            background: radial-gradient(circle, rgba(50,69,55,0.05) 0%, transparent 65%);
            animation: driftB 26s ease-in-out infinite alternate;
        }
        @keyframes driftA { to { transform: translate(4%, 9%); } }
        @keyframes driftB { to { transform: translate(-5%, -6%); } }

        #nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 28px 56px; display: flex; align-items: center; justify-content: space-between;
            transition: background 500ms ease, backdrop-filter 500ms ease, border-color 400ms ease;
            border-bottom: 1px solid transparent;
        }
        #nav.scrolled {
            background: rgba(245,247,245,0.88);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom-color: var(--border);
        }
        .nav-mark {
            font-family: var(--mono); font-size: 12px; font-weight: 400;
            letter-spacing: 0.16em; color: var(--accent); text-decoration: none;
        }
        .nav-list { list-style: none; display: flex; gap: 40px; }
        .nav-list a {
            font-size: 11px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); text-decoration: none; transition: color 200ms;
        }
        .nav-list a:hover { color: var(--accent); }

        .reveal {
            opacity: 0; transform: translateY(24px);
            transition: opacity 750ms var(--ease) var(--d, 0ms), transform 750ms var(--ease) var(--d, 0ms);
        }
        .reveal.in { opacity: 1; transform: translateY(0); }

        footer {
            position: relative; z-index: 1; padding: 28px 56px;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        footer span, footer a { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); }
        .footer-meta { display: inline-flex; align-items: center; justify-content: flex-end; gap: 10px; }
        footer a { color: inherit; text-decoration: none; transition: opacity 200ms ease; }
        footer a:hover, footer a:focus-visible { opacity: 0.72; outline: none; }
        .footer-credit { text-transform: none; }

        .back-wrap { position: relative; z-index: 1; padding: 120px 56px 0; }
        .back-link {
            font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 12px;
            transition: color 200ms, gap 350ms var(--ease);
        }
        .back-link::before { content: '←'; font-size: 13px; line-height: 1; }
        .back-link:hover { color: var(--accent); gap: 18px; }

        .detail-header { position: relative; z-index: 1; padding: 36px 136px 64px 56px; }
        .detail-meta-row {
            font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--muted); display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
        }
        .detail-meta-row .num { color: var(--accent); }
        .detail-h1 {
            font-family: var(--serif); font-size: clamp(44px, 7vw, 104px);
            font-weight: 400; letter-spacing: -0.035em; line-height: 0.92; color: var(--text);
        }
        .detail-material {
            font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
            color: var(--muted); margin-top: 22px; display: block; line-height: 1.7;
        }
        .detail-cue {
            position: absolute;
            top: 50%;
            right: 56px;
            transform: translateY(-50%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 700ms 1700ms var(--ease) forwards;
            pointer-events: none;
        }
        .cue-track {
            width: 1px;
            height: 68px;
            background: var(--border);
            position: relative;
            overflow: hidden;
        }
        .cue-track::after {
            content: '';
            position: absolute;
            top: -60%;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--accent);
            animation: trackDrop 2s 1.8s ease-in-out infinite;
        }
        .cue-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            writing-mode: vertical-lr;
        }

        .detail-lead {
            position: relative; z-index: 1; padding: 0 56px;
            display: grid; justify-items: center;
        }
        .detail-lead.rail-narrow { --lead-max: 920px; }
        .detail-lead.rail-medium { --lead-max: 1120px; }
        .detail-lead.rail-wide { --lead-max: 1320px; }
        .image-zoom-link {
            position: relative;
            display: block;
            width: 100%;
            text-decoration: none;
            cursor: zoom-in;
        }
        .detail-lead .image-zoom-link { max-width: var(--lead-max, 1220px); }
        .image-zoom-link:focus-visible {
            outline: none;
            box-shadow: inset 0 0 0 1px var(--accent);
        }
        .detail-lead img {
            width: 100%; max-width: none; height: auto; display: block;
            transition: transform 900ms var(--ease);
        }
        .detail-lead .image-zoom-link:hover img,
        .detail-lead .image-zoom-link:focus-visible img {
            transform: scale(1.015);
        }

        .detail-gallery { position: relative; z-index: 1; padding: 88px 56px 128px; }
        .gallery-header {
            font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
            color: var(--muted); padding: 26px 0; margin-bottom: 44px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }
        .gallery-count { color: var(--border); }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 1320px; margin: 0 auto; align-items: start; }
        .g-span-2 { grid-column: span 2; }
        .gallery-row {
            display: grid; gap: 16px; align-items: start;
            width: 100%; max-width: var(--row-max, 1180px); margin: 0 auto;
        }
        .gallery-row.one   { grid-template-columns: 1fr; }
        .gallery-row.two   { grid-template-columns: 1fr 1fr; }
        .gallery-row.asym  { grid-template-columns: 2fr 1fr; }
        .gallery-row.asym-r{ grid-template-columns: 1fr 2fr; }
        .gallery-row.rail-narrow { --row-max: 920px; }
        .gallery-row.rail-medium { --row-max: 1120px; }
        .gallery-row.rail-wide { --row-max: 1320px; }
        .g-img { overflow: hidden; background: var(--border); }
        .g-img img {
            width: 100%; height: auto; display: block;
            transition: transform 900ms var(--ease);
        }
        .g-img:hover img { transform: scale(1.04); }
        .ar-3-4 { aspect-ratio: auto; }
        .ar-4-3 { aspect-ratio: auto; }
        .ar-1-1 { aspect-ratio: auto; }
        .ar-2-3 { aspect-ratio: auto; }

        .work-nav {
            position: relative; z-index: 1; padding: 48px 56px; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr;
        }
        .wnav-link { text-decoration: none; }
        .wnav-dir {
            font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--muted); display: block; margin-bottom: 9px;
        }
        .wnav-title {
            font-family: var(--serif); font-size: 17px; font-weight: 400; letter-spacing: -0.01em;
            color: var(--text); display: block; max-width: 360px; transition: color 200ms;
        }
        .wnav-link:hover .wnav-title { color: var(--accent); }
        .wnav-link.right { text-align: right; justify-self: end; }
        .wnav-link.right .wnav-title { margin-left: auto; }

        @media (max-width: 960px) {
            #nav { padding: 28px 28px; }
            .back-wrap { padding: 100px 28px 0; }
            .detail-header { padding: 24px 28px 40px; }
            .detail-cue { display: none; }
            .detail-lead { padding: 0 28px; }
            .detail-gallery { padding: 56px 28px 88px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .g-span-2 { grid-column: span 1; }
            .work-nav { padding: 40px 28px; }
        }
        @media (max-width: 600px) {
            .detail-h1 { font-size: clamp(36px, 11vw, 56px); }
            .work-nav { grid-template-columns: 1fr; gap: 36px; }
            .wnav-link.right { text-align: left; justify-self: start; }
            .wnav-link.right .wnav-title { margin-left: 0; }
        }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body>
    <div id="loader" class="site-loader" aria-hidden="true"><p class="loader-mark">G · P</p></div>

    <div id="progress"></div>
    <div class="ambient"></div>

    <nav id="nav">
        <a href="../index.html" class="nav-mark">G · P</a>
        <ul class="nav-list">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../gallery/ceramic.html">Galleries</a></li>
            <li><a href="../index.html#about">About</a></li>
            <li><a href="../index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="back-wrap">
        <a href="../gallery/ceramic.html" class="back-link">Ceramic</a>
    </div>

    <header class="detail-header reveal">
        <div class="detail-meta-row">
            <span class="num">08</span>
            <span>—</span>
            <span>Art</span>
            <span>·</span>
            <span>2025</span>
        </div>
        <h1 class="detail-h1">Aqueduct</h1>
        <span class="detail-material">Ceramic &nbsp;·&nbsp; 9&quot; &times; 18&quot; &times; 4.5&quot;</span>
        <div class="detail-cue" aria-hidden="true">
            <div class="cue-track"></div>
            <span class="cue-label">Scroll</span>
        </div>
    </header>

    <figure class="detail-lead reveal rail-medium" style="--d:80ms">
        <a class="image-zoom-link" href="../assets/aqueduct/front-view-web.jpg" target="_blank" rel="noopener noreferrer">
            <img src="../assets/aqueduct/front-view-web.jpg"
                 alt="Aqueduct — front view" width="2400" height="1800" loading="eager" decoding="async" fetchpriority="high">
        </a>
    </figure>

    <section class="detail-gallery">
        <div class="gallery-header reveal">
            <span>Views</span>
            <span class="gallery-count">04</span>
        </div>
        <div class="gallery-grid">
            <div class="g-img ar-4-3 reveal" style="--d:60ms">
                <a class="image-zoom-link" href="../assets/aqueduct/back-view-web.jpg" target="_blank" rel="noopener noreferrer">
                    <img src="../assets/aqueduct/back-view-web.jpg"
                         alt="Aqueduct — back view" width="2400" height="1800" loading="lazy" decoding="async">
                </a>
            </div>
            <div class="g-img ar-4-3 reveal" style="--d:80ms">
                <a class="image-zoom-link" href="../assets/aqueduct/side-view-web.jpg" target="_blank" rel="noopener noreferrer">
                    <img src="../assets/aqueduct/side-view-web.jpg"
                         alt="Aqueduct — side view" width="2400" height="1800" loading="lazy" decoding="async">
                </a>
            </div>
            <div class="g-img ar-4-3 reveal" style="--d:100ms">
                <a class="image-zoom-link" href="../assets/aqueduct/second-side-view-web.jpg" target="_blank" rel="noopener noreferrer">
                    <img src="../assets/aqueduct/second-side-view-web.jpg"
                         alt="Aqueduct — second side view" width="2400" height="1800" loading="lazy" decoding="async">
                </a>
            </div>
            <div class="g-img ar-4-3 reveal" style="--d:120ms">
                <a class="image-zoom-link" href="../assets/aqueduct/alternate-side-view-web.jpg" target="_blank" rel="noopener noreferrer">
                    <img src="../assets/aqueduct/alternate-side-view-web.jpg"
                         alt="Aqueduct — alternate side view" width="2400" height="1800" loading="lazy" decoding="async">
                </a>
            </div>
        </div>
    </section>

    <nav class="work-nav">
        <a href="./void.html" class="wnav-link">
            <span class="wnav-dir">← Previous</span>
            <span class="wnav-title">Void</span>
        </a>
        <a href="./hydrant.html" class="wnav-link right">
            <span class="wnav-dir">Next →</span>
            <span class="wnav-title">Hydrant</span>
        </a>
    </nav>

    <footer>
        <span>Gregory Parizhsky</span>
        <span class="footer-meta"><a class="footer-credit" href="https://tech-savvies.com/">Made by Tech-Savvvies</a><span>&copy; 2026</span></span>
    </footer>

    <script>
        const prog = document.getElementById('progress');
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            prog.style.transform = `scaleX(${pct})`;
            nav.classList.toggle('scrolled', window.scrollY > 48);
        }, { passive: true });
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); observer.unobserve(e.target); } });
        }, { threshold: 0.07, rootMargin: '0px 0px -52px 0px' });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
